services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      OPENAI_EDITORIAL_MODEL: ${OPENAI_EDITORIAL_MODEL:-}
      OPENAI_SEARCH_MODEL: ${OPENAI_SEARCH_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_STYLE: ${OPENAI_API_STYLE:-responses}
      OPENAI_PROVIDER_LABEL: ${OPENAI_PROVIDER_LABEL:-OpenAI}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
      OPENAI_WEB_SEARCH_ENABLED: ${OPENAI_WEB_SEARCH_ENABLED:-true}
      OPENAI_WEB_SEARCH_LIVE: ${OPENAI_WEB_SEARCH_LIVE:-true}
      OPENAI_WEB_SEARCH_CONTEXT_SIZE: ${OPENAI_WEB_SEARCH_CONTEXT_SIZE:-medium}
    ports:
      - "127.0.0.1:8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      EZBET_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      EZBET_ADMIN_USERNAME: ${EZBET_ADMIN_USERNAME}
      EZBET_ADMIN_PASSWORD: ${EZBET_ADMIN_PASSWORD}
      EZBET_ADMIN_SESSION_SECRET: ${EZBET_ADMIN_SESSION_SECRET}
      EZBET_ADMIN_API_TOKEN: ${EZBET_ADMIN_API_TOKEN}
      EZBET_ADMIN_SECURE_COOKIE: ${EZBET_ADMIN_SECURE_COOKIE:-true}
    depends_on:
      - api

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      EZBET_PUBLIC_HOST: ${EZBET_PUBLIC_HOST}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
